<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link rel="stylesheet" href="./css/bootstrap.min.css" />
  </head>
  <body>
    <div class="container-fluid">
      <div class="row">
        <div class="col-12 mt-5 text-center">
        <span class="border p-2">border</span>
        <span class="border-top p-2">border-top</span>
        <span class="border-end p-2">border-end</span>
        <span class="border-bottom p-2">border-bottom</span>
        <span class="border-start p-2">border-start</span>
        
        <br>
        <br>
        <br>
        <span class="border border-bottom-0 p-2">border-Subtractive</span>
        <br>
        <br>
        <br>
        <span class="border border-danger-subtle p-2">border-Color</span>
        <br>
        <br>
        <br>
        <span class="border border-bottom-0 border-dark-subtle border-5 p-2">border-Width</span>
        <br>
        <br>
        <br>
        <span class="border  border-3 border-danger-subtle rounded-pill p-2 px-5">border-radious</span>
        <br>
        <br>
        <span class="border  border-3 border-danger-subtle rounded-5 rounded-start-2  p-2 px-5">border-round</span>
        <br>
        <br>
        <span class="border px-4 py-2 border-dark border-1 rounded-pill border-opacity-75">Border Opacity</span>
        </div>
      </div>
    </div>
    <script src="./js/bootstrap.bundle.js"></script>
    <script src="./js/bootstrap.min.js"></script>
  </body>
</html>
